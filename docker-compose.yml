networks:
  expense-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  evolution_instances:
  nocodb_data:
  metabase_data:

services:
  # -------------------------------------------------------------------
  # PostgreSQL 18.3 — internal only
  # -------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-8832}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: n8n,evolution,expenses,nocodb,metabase
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    networks:
      - expense-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------
  # db-init — idempotent bootstrap, runs on every `docker compose up`
  # Creates missing databases and applies schema.sql when expenses is empty
  # -------------------------------------------------------------------
  db-init:
    image: postgres:18.3-alpine
    container_name: db-init
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: n8n,evolution,expenses,nocodb,metabase
    volumes:
      - ./db-init.sh:/db-init.sh:ro
      - ./schema.sql:/schema.sql:ro
    networks:
      - expense-net
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "/db-init.sh"]

  # -------------------------------------------------------------------
  # Redis 8.6.2 — internal only
  # -------------------------------------------------------------------
  redis:
    image: redis:8.6.2-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - expense-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # n8n — exposed on PORT_N8N (default 5678)
  # -------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${PORT_N8N:-5678}:${PORT_N8N:-5678}"
    environment:
      # Core — HTTP, no SSL
      # IMPORTANT: N8N_PORT must equal the external port so the Origin
      # check (used by /rest/push) builds the same URL the browser sends.
      N8N_HOST: ${VPS_IP}
      N8N_PORT: ${PORT_N8N:-5678}
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://${VPS_IP}:${PORT_N8N:-5678}
      WEBHOOK_URL: http://${VPS_IP}:${PORT_N8N:-5678}/
      N8N_LISTEN_ADDRESS: 0.0.0.0
      GENERIC_TIMEZONE: ${TZ}
      TZ: ${TZ}

      # Allow this for HTTP-only access (otherwise n8n insists on HTTPS for some flows)
      N8N_SECURE_COOKIE: "false"

      # Phone whitelist — used by the workflow (read via $env.ALLOWED_PHONES)
      ALLOWED_PHONES: ${ALLOWED_PHONES}

      # Evolution API key — used by HTTP Request nodes that call Evolution
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}

      # Security
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      # Must be false so $env.ALLOWED_PHONES is reachable from Code/IF nodes
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # Push backend — usa SSE para evitar el bug de WebSocket detrás del
      # bridge de Docker Desktop en Windows (code=1005 cada segundo).
      N8N_PUSH_BACKEND: sse

      # Database (Postgres)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Misc
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 720
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - expense-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # -------------------------------------------------------------------
  # Evolution API — exposed on PORT_EVOLUTION (default 8080)
  # -------------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "${PORT_EVOLUTION:-8080}:8080"
    environment:
      SERVER_URL: http://${VPS_IP}:${PORT_EVOLUTION:-8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Database
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # Media storage — needed so getBase64FromMediaMessage actually downloads & decrypts
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      S3_ENABLED: "false"

      # Cache (Redis)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://default:${REDIS_PASSWORD}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      WEBHOOK_GLOBAL_ENABLED: "false"

      CONFIG_SESSION_PHONE_CLIENT: ExpenseBot
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30

      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"

      LANGUAGE: es
      TZ: ${TZ}
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - expense-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # -------------------------------------------------------------------
  # NocoDB — exposed on PORT_NOCODB (default 8081)
  # -------------------------------------------------------------------
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    ports:
      - "${PORT_NOCODB:-8081}:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=nocodb"
      NC_PUBLIC_URL: http://${VPS_IP}:${PORT_NOCODB:-8081}
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET}
      NC_DISABLE_TELE: "true"
      # Allow connecting to internal/private hosts (postgres in same docker network)
      NC_ALLOW_LOCAL_HOOKS: "true"
      NC_DISABLE_AUDIT: "false"
      NC_CONNECT_TO_EXTERNAL_DB_DISABLED: "false"
      NC_TOOL_DIR: /usr/app/data
      NC_PRIVATE_HOST_BLOCK_DISABLED: "true"
      NC_DB_VALIDATE_DISABLE_PRIVATE_IPS: "true"
      TZ: ${TZ}
    volumes:
      - nocodb_data:/usr/app/data
    networks:
      - expense-net
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # -------------------------------------------------------------------
  # Metabase — exposed on PORT_METABASE (default 3001)
  # -------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "${PORT_METABASE:-3001}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_URL: http://${VPS_IP}:${PORT_METABASE:-3001}
      JAVA_TIMEZONE: ${TZ}
      TZ: ${TZ}
    volumes:
      - metabase_data:/metabase-data
    networks:
      - expense-net
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
